buildscript {
    ext {
        compose_version = '1.5.4'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0' // Verifica la última versión
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0' // Verifica la última versión
        classpath 'org.jetbrains.kotlin:kotlin-serialization:1.9.0' // Kotlin Serialization plugin
        classpath 'com.google.gms:google-services:4.4.1' // Google Services plugin (para Firebase)
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
